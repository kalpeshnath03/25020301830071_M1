<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform properties animation</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        div {
            width: 200px;
            text-align: center;
            display: flex;
            height: 200px;
            background-color:red;
            /* align-items: center; */
            border-radius: 150px;

            /* justify-content: center; */
            animation: spin 8s linear infinite;

        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div>
        <h1>transform properties animation</h1>
    </div>
</body>

</html>
