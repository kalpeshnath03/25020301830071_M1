<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Pixedraw</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>
  <header>
    <h1><a href="index.html">Pixedraw</a></h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h1>Contact Us</h1>
      <p>Get in touch with us to discuss your project.</p>
    </section>
    
    <section class="contact-form-section">
      <form method="POST" action="#">
        <div class="form-group">
          <label for="username">Full Name</label>
          <input type="text" id="username" name="username" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
        </div>

        <div class="form-group">
          <label for="service">Service Needed</label>
          <select id="service" name="service" required>
            <option value="">-- Select a Service --</option>
            <option value="logo-design">Logo Design</option>
            <option value="web-design">Web Design</option>
            <option value="branding">Branding</option>
            <option value="social-media">Social Media</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us about your project" required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Pixedraw. All rights reserved.</p>
  </footer>
</body>
</html>
