<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border=""2">
        <caption>table caption</caption>
        <tr>
            <th>heading 1</th>
            <th>heading 2</th>
        </tr>
        <tr>
            <td>row 1 column 1 </td>
            <td>row 1 column 2 </td>
        </tr>
        <tr>
            <td>row 2 column 1 </td>
            <td>row 2 column 2 </td>
        </tr>
    </table><br><br>

    <table border="1"  colspacing="2" height="100%" width="50%">
        <tr align="center">
            <td colspan="2">A</td>
            <td colspan="5">B</td>
        </tr>
        <tr align="center">
            <td>C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
            <td>G</td>
            <td>H</td>
            <td rowspan="3">J</td>
        </tr>
        <tr align="center">
            <td rowspan="2">K</td>
            <td>L</td>
            <td colspan="2">M</td>
            <td colspan="2">n</td>
        </tr>
        <tr align="center">
            <td>o</td>
            <td>p</td>
            <td>Q</td>
            <td>R</td>
            <td>S</td>
            <!-- <td>T</td> -->
        </tr>
    </table>
</body>
</html>
