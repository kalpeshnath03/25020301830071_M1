<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settimeout method</title>
</head>

<body id="mybody">
    
</body>
<script>
        // setTimeout(callme, 2000);
        // function callme() {
        //     alert("Welcome to our website");
        // }

        // setInterval(callme, 4000);
        //     function callme() {
        //         alert("NAMASTE ");
        //     }
        var colors = ["red", "blue", "green", "yellow", "orange"];
        var mybody = document.getElementById("mybody");
        var i = 0;
        setInterval(() => {
            mybody.style.backgroundColor = colors[i];
            i++;
            if (i == colors.length) {
                i = 0;
            }
        }, 1000);
    </script>
</html>
