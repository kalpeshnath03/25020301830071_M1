<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table generate</title>
</head>

<body>
    <input type="text" id="row" placeholder="Enter number of rows">
    <input type="text" id="col" placeholder="Enter number of columns">
    <input type="button" value="Generate Table" id="btn1">

</body>
<script>
    var rows = document.getElementById("row");
    var cols = document.getElementById("col");
    var btn1 = document.getElementById("btn1");
    btn1.addEventListener("click", () => {
        document.write("<table border='2' width='50%'>");
        for (let i = 0; i < rows.value; i++) {
            document.write("<tr>");
            for (let j = 0; j < cols.value; j++) {
                document.write("<td>Row " + "[" + i + "]" + "[" + j + "]" + "</td>");
            }
            document.write("</tr>");
        }
        document.write("</table>");
    });
</script>

</html>
